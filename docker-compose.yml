version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      vault:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      api:
        condition: service_started
    command: streamlit run chatbot/app.py

  modelserver:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn modelserver.main:app --host 0.0.0.0 --port 8001 --reload

  widget:
    image: node:20-alpine
    working_dir: /widget
    volumes:
      - ./widget:/widget
    ports:
      - "3000:3000"
    command: npm run dev

  host:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - ./demo/host:/usr/share/nginx/html:ro

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "if [ -f alembic.ini ]; then alembic upgrade head; else echo 'No alembic.ini, skipping migration'; fi"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: your_minio_user
      MINIO_ROOT_PASSWORD: your_minio_password
    ports:
      - "9002:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - miniodata:/data

  vault:
    image: hashicorp/vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN:-your_vault_dev_token}
      SKIP_SETCAP: "true"
      SKIP_CHOWN: "true"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
      - SETFCAP
    privileged: true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault-init:
    image: hashicorp/vault
    volumes:
      - ./scripts:/scripts
    environment:
      VAULT_ROOT_TOKEN: ${VAULT_ROOT_TOKEN:-your_vault_dev_token}
    depends_on:
      vault:
        condition: service_healthy
    command: /scripts/vault_init.sh

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Web UI
      - "4317:4317"    # OTLP gRPC port
      - "4318:4318"    # OTLP HTTP port
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  pgdata:
  redisdata:
  miniodata:
